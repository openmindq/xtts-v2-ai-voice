version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: xtts_redis
    ports:
      - "6379:6379"

  xtts-api:
    build: .
    container_name: xtts_v2_service
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./cache/audio:/app/cache/audio
      - ./samples:/app/samples
      - ./outputs:/app/outputs
    environment:
      - REDIS_URL=redis://xtts_redis:6379/0
      - USE_GPU=true
    restart: unless-stopped

  xtts-worker:
    build: .
    container_name: xtts_worker
    command: celery -A src.xtts_voice.worker worker --loglevel=info
    depends_on:
      - redis
    volumes:
      - ./cache/audio:/app/cache/audio
      - ./samples:/app/samples
      - ./outputs:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - REDIS_URL=redis://xtts_redis:6379/0
      - USE_GPU=true
    restart: unless-stopped
